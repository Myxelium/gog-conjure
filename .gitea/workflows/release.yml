name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/upload (e.g. v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

# Linux-only on Gitea Act (no Node.js / no Win/mac runners).
# Multi-platform binaries (incl. Windows/macOS ARM) are published by GitHub.
jobs:
  release-linux:
    name: Build & publish Linux release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
          if ! command -v git >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
            $SUDO apt-get update
            $SUDO apt-get install -y git ca-certificates curl
          fi
          if [ ! -f Cargo.toml ]; then
            git init
            git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
            git fetch --depth 1 origin "${GITHUB_SHA}"
            git checkout --force FETCH_HEAD
          fi
          test -f Cargo.toml

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect arch
        id: arch
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64|amd64) echo "name=x86_64" >> "$GITHUB_OUTPUT" ;;
            aarch64|arm64) echo "name=aarch64" >> "$GITHUB_OUTPUT" ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac

      - name: Install Rust
        run: |
          set -euo pipefail
          if ! command -v rustc >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal
          fi
          # shellcheck disable=SC1091
          . "$HOME/.cargo/env"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
          $SUDO apt-get update
          $SUDO apt-get install -y \
            build-essential pkg-config \
            libgtk-3-dev libxkbcommon-dev libssl-dev \
            curl ca-certificates file \
            dpkg-dev fakeroot || true
          if ! $SUDO apt-get install -y libwebkit2gtk-4.1-dev; then
            $SUDO apt-get install -y libwebkit2gtk-4.0-dev
          fi
          $SUDO apt-get install -y libfuse2 || true

      - name: Build & package
        env:
          TAG: ${{ steps.tag.outputs.name }}
          ARCH: ${{ steps.arch.outputs.name }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . "$HOME/.cargo/env"
          cargo build --release --locked
          chmod +x scripts/package-linux.sh
          ./scripts/package-linux.sh \
            target/release/gog-conjure \
            "$TAG" \
            "$ARCH" \
            dist
          ls -lah dist

      - name: Publish Gitea release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}"
          AUTH="Authorization: token ${GITHUB_TOKEN}"

          curl -sS -X POST \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"gog-conjure ${TAG}\",\"draft\":false}" \
            "${API}/releases" >/tmp/create-release.json || true

          RELEASE_JSON=$(curl -sS -H "$AUTH" "${API}/releases/tags/${TAG}")
          RELEASE_ID=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$RELEASE_JSON")
          echo "Release id: ${RELEASE_ID}"

          ASSETS_JSON=$(curl -sS -H "$AUTH" "${API}/releases/${RELEASE_ID}/assets")

          upload_asset() {
            local file="$1"
            local name
            name=$(basename "$file")
            local old_id
            old_id=$(printf '%s' "$ASSETS_JSON" | python3 -c "import json,sys; name=sys.argv[1]; assets=json.load(sys.stdin); print(next((str(a['id']) for a in assets if a.get('name')==name), ''))" "$name" || true)
            if [ -n "${old_id:-}" ]; then
              curl -sS -X DELETE -H "$AUTH" "${API}/releases/assets/${old_id}" >/dev/null || true
            fi
            echo "Uploading ${name}…"
            curl -sS -f -X POST \
              -H "$AUTH" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"${file}" \
              "${API}/releases/${RELEASE_ID}/assets?name=${name}" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('name'), d.get('browser_download_url','') or d.get('id'))"
          }

          for f in dist/*; do
            [ -f "$f" ] || continue
            upload_asset "$f"
            # Refresh asset list after each upload so replace logic stays accurate.
            ASSETS_JSON=$(curl -sS -H "$AUTH" "${API}/releases/${RELEASE_ID}/assets")
          done
          echo "Published ${TAG} assets from dist/"
