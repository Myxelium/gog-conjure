name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/upload (e.g. v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libxkbcommon-dev libssl-dev
      - run: cargo build --release --locked
      - run: |
          mkdir -p dist
          cp target/release/gog-conjure dist/gog-conjure-linux-x86_64
          chmod +x dist/gog-conjure-linux-x86_64
      - uses: actions/upload-artifact@v3
        with:
          name: gog-conjure-linux-x86_64
          path: dist/gog-conjure-linux-x86_64

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - run: |
          mkdir dist
          copy target\release\gog-conjure.exe dist\gog-conjure-windows-x86_64.exe
        shell: cmd
      - uses: actions/upload-artifact@v3
        with:
          name: gog-conjure-windows-x86_64.exe
          path: dist/gog-conjure-windows-x86_64.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - run: |
          mkdir -p dist
          cp target/release/gog-conjure dist/gog-conjure-macos
          chmod +x dist/gog-conjure-macos
      - uses: actions/upload-artifact@v3
        with:
          name: gog-conjure-macos
          path: dist/gog-conjure-macos

  release:
    name: Publish Gitea release
    needs: [build-linux, build-windows, build-macos]
    if: ${{ always() && needs.build-linux.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v3
        with:
          path: release-assets
      - run: |
          mkdir -p upload
          find release-assets -type f -exec cp {} upload/ \;
          ls -la upload
          test -n "$(find upload -type f | head -n 1)"
      - id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: gog-conjure ${{ steps.tag.outputs.name }}
          draft: false
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
