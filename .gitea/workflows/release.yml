name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/upload (e.g. v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

# Linux-only on Gitea Act (no Node.js / no Win/mac runners).
# Multi-platform binaries are published by the GitHub Release workflow.
jobs:
  release-linux:
    name: Build & publish Linux release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
          if ! command -v git >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
            $SUDO apt-get update
            $SUDO apt-get install -y git ca-certificates curl
          fi
          if [ ! -f Cargo.toml ]; then
            git init
            git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
            git fetch --depth 1 origin "${GITHUB_SHA}"
            git checkout --force FETCH_HEAD
          fi
          test -f Cargo.toml

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        run: |
          set -euo pipefail
          if ! command -v rustc >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal
          fi
          # shellcheck disable=SC1091
          . "$HOME/.cargo/env"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
          $SUDO apt-get update
          if ! $SUDO apt-get install -y \
              build-essential pkg-config \
              libgtk-3-dev libwebkit2gtk-4.1-dev \
              libxkbcommon-dev libssl-dev; then
            $SUDO apt-get install -y \
              build-essential pkg-config \
              libgtk-3-dev libwebkit2gtk-4.0-dev \
              libxkbcommon-dev libssl-dev
          fi

      - name: Build release binary
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . "$HOME/.cargo/env"
          cargo build --release --locked
          mkdir -p dist
          cp target/release/gog-conjure dist/gog-conjure-linux-x86_64
          chmod +x dist/gog-conjure-linux-x86_64

      - name: Publish Gitea release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}"
          AUTH="Authorization: token ${GITHUB_TOKEN}"
          ASSET=dist/gog-conjure-linux-x86_64

          # Create release (ok if it already exists for this tag).
          curl -sS -X POST \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"gog-conjure ${TAG}\",\"draft\":false}" \
            "${API}/releases" >/tmp/create-release.json || true

          RELEASE_JSON=$(curl -sS -H "$AUTH" "${API}/releases/tags/${TAG}")
          RELEASE_ID=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$RELEASE_JSON")
          echo "Release id: ${RELEASE_ID}"

          # Replace previous asset on re-runs.
          ASSETS_JSON=$(curl -sS -H "$AUTH" "${API}/releases/${RELEASE_ID}/assets")
          OLD_ID=$(python3 -c '
import json,sys
name="gog-conjure-linux-x86_64"
for a in json.load(sys.stdin):
    if a.get("name")==name:
        print(a["id"]); break
' <<<"$ASSETS_JSON" || true)
          if [ -n "${OLD_ID:-}" ]; then
            curl -sS -X DELETE -H "$AUTH" "${API}/releases/assets/${OLD_ID}" >/dev/null || true
          fi

          curl -sS -f -X POST \
            -H "$AUTH" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${ASSET}" \
            "${API}/releases/${RELEASE_ID}/assets?name=gog-conjure-linux-x86_64" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("name"), d.get("browser_download_url","") or d.get("id"))'
          echo "Published ${TAG} with gog-conjure-linux-x86_64"
