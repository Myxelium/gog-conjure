name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Gitea Act runners often use a plain Ubuntu image with no Node.js.
# Avoid JS actions (actions/checkout, dtolnay/rust-toolchain, …) entirely.
jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
          if ! command -v git >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
            $SUDO apt-get update
            $SUDO apt-get install -y git ca-certificates curl
          fi
          if [ ! -f Cargo.toml ]; then
            git init
            git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
            git fetch --depth 1 origin "${GITHUB_SHA}"
            git checkout --force FETCH_HEAD
          fi
          test -f Cargo.toml
          git log -1 --oneline || true

      - name: Install Rust
        run: |
          set -euo pipefail
          if ! command -v rustc >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal
          fi
          # shellcheck disable=SC1091
          . "$HOME/.cargo/env"
          rustc -vV
          cargo -vV
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
          $SUDO apt-get update
          # Prefer webkit 4.1 (Ubuntu 22.04+); fall back to 4.0 on older images.
          if ! $SUDO apt-get install -y \
              build-essential pkg-config \
              libgtk-3-dev libwebkit2gtk-4.1-dev \
              libxkbcommon-dev libssl-dev; then
            $SUDO apt-get install -y \
              build-essential pkg-config \
              libgtk-3-dev libwebkit2gtk-4.0-dev \
              libxkbcommon-dev libssl-dev
          fi

      - name: Build
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . "$HOME/.cargo/env"
          cargo build --locked

      - name: Test
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . "$HOME/.cargo/env"
          cargo test --locked
