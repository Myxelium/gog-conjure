name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Prefer a plain rustup install: Act runners often struggle with
      # composite JS actions like dtolnay/rust-toolchain.
      - name: Install Rust
        run: |
          set -euo pipefail
          if ! command -v rustc >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal
          fi
          # shellcheck disable=SC1091
          . "$HOME/.cargo/env"
          rustc -vV
          cargo -vV
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
          $SUDO apt-get update
          # Prefer webkit 4.1 (Ubuntu 22.04+); fall back to 4.0 on older images.
          if ! $SUDO apt-get install -y \
              build-essential pkg-config \
              libgtk-3-dev libwebkit2gtk-4.1-dev \
              libxkbcommon-dev libssl-dev; then
            $SUDO apt-get install -y \
              build-essential pkg-config \
              libgtk-3-dev libwebkit2gtk-4.0-dev \
              libxkbcommon-dev libssl-dev
          fi

      - run: cargo build --locked
      - run: cargo test --locked
