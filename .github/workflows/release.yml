name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/upload (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: gog-conjure-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gog-conjure-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gog-conjure-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: gog-conjure-macos-x86_64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libxkbcommon-dev libssl-dev
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/gog-conjure"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN="${BIN}.exe"
          fi
          mkdir -p dist
          cp "$BIN" "dist/${{ matrix.artifact }}"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "dist/${{ matrix.artifact }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - run: |
          mkdir -p upload
          find release-assets -type f -exec cp {} upload/ \;
          ls -la upload
      - id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: gog-conjure ${{ steps.tag.outputs.name }}
          draft: false
          generate_release_notes: true
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
