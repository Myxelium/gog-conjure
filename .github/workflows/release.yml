name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/upload (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — raw binary + .deb + AppImage
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: gog-conjure-linux-x86_64
            arch: x86_64
            package_linux: true
          # Linux ARM64 — raw binary + .deb + AppImage
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: gog-conjure-linux-aarch64
            arch: aarch64
            package_linux: true
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gog-conjure-windows-x86_64.exe
            arch: x86_64
            package_linux: false
          # Windows ARM64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact: gog-conjure-windows-aarch64.exe
            arch: aarch64
            package_linux: false
          # macOS
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gog-conjure-macos-aarch64
            arch: aarch64
            package_linux: false
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: gog-conjure-macos-x86_64
            arch: x86_64
            package_linux: false

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libxkbcommon-dev libssl-dev \
            curl ca-certificates file \
            dpkg-dev fakeroot \
            libfuse2 || true
          # webkit 4.1 may be unavailable on some images; try 4.0.
          if ! dpkg -s libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Resolve version tag
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/gog-conjure"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN="${BIN}.exe"
          fi
          mkdir -p dist
          if [[ "${{ matrix.package_linux }}" == "true" ]]; then
            chmod +x scripts/package-linux.sh
            ./scripts/package-linux.sh "$BIN" "${{ steps.ver.outputs.name }}" "${{ matrix.arch }}" dist
          else
            cp "$BIN" "dist/${{ matrix.artifact }}"
            if [[ "${{ runner.os }}" != "Windows" ]]; then
              chmod +x "dist/${{ matrix.artifact }}"
            fi
          fi
          ls -lah dist
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    # Publish whatever platforms succeeded; do not require the full matrix.
    if: ${{ always() && needs.build.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - run: |
          mkdir -p upload
          find release-assets -type f -exec cp {} upload/ \;
          ls -la upload
          test -n "$(find upload -type f | head -n 1)"
      - id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: gog-conjure ${{ steps.tag.outputs.name }}
          draft: false
          generate_release_notes: true
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
